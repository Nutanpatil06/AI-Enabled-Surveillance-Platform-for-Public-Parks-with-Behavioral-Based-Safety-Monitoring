<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="navbar">
    <h2>Park Surveillance Dashboard</h2>

    <!-- INLINE ONCLICK -->
    <button type="button" onclick="logout()" class="danger">
        Logout
    </button>
</div>

<div class="card">
    <h3>Upload Park Video</h3>

    <input type="file" id="videoFile" accept=".mp4,.avi">

    <!-- INLINE ONCLICK -->
    <button type="button" onclick="uploadVideo()">
        Upload
    </button>

    <p id="status">Waiting for upload...</p>

    <div class="progress">
        <div id="progressFill">0%</div>
    </div>
</div>

<div class="grid">
    <div class="card">
        <h3>Analytics</h3>
        <p>Authorized: <span id="auth">0</span></p>
        <p>Unauthorized: <span id="unauth">0</span></p>

        <a id="downloadLink" target="_blank">
            Download Excel Report
        </a>
    </div>

    <div class="card">
        <h3>Admin Logs</h3>
        <ul id="logs"></ul>
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
